context:
  version: "0.13.0"

package:
  name: handlr-regex
  version: ${{ version }}

source:
  url: https://github.com/Anomalocaridid/handlr-regex/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 963126a7aa8277b7cc7886c518528473ce5117a5999c949b809e14beffdbad0d

build:
  number: 1
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - cargo auditable install --locked --no-track --bins --root="$PREFIX" --path=.
      # copy manpage and generate shell completions
      - mkdir -p "$PREFIX/share/man/man1" "$PREFIX"/share/bash-completion/completions "$PREFIX"/share/fish/vendor_completions.d "$PREFIX"/share/zsh/site-functions
      - cp -r target/*/release/build/handlr-regex-*/out/manual/man1/* "$PREFIX"/share/man/man1/
      - COMPLETE=bash "$PREFIX"/bin/handlr > "$PREFIX"/share/bash-completion/completions/handlr
      - COMPLETE=fish "$PREFIX"/bin/handlr > "$PREFIX"/share/fish/vendor_completions.d/handlr.fish
      - COMPLETE=zsh  "$PREFIX"/bin/handlr > "$PREFIX"/share/zsh/site-functions/_handlr
      - cargo-bundle-licenses --format=yaml --output=./THIRDPARTY.yml
  skip:
    - osx
    - win

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - handlr --help
      - handlr --version
  - package_contents:
      bin:
        - handlr
      files:
        - share/man/man1/handlr.1
        - share/man/man1/handlr-add.1
        - share/man/man1/handlr-get.1
        - share/man/man1/handlr-launch.1
        - share/man/man1/handlr-list.1
        - share/man/man1/handlr-mime.1
        - share/man/man1/handlr-open.1
        - share/man/man1/handlr-remove.1
        - share/man/man1/handlr-set.1
        - share/man/man1/handlr-unset.1
        - share/bash-completion/completions/handlr
        - share/fish/vendor_completions.d/handlr.fish
        - share/zsh/site-functions/_handlr
      strict: true

about:
  summary: Modern CLI to set default file handlers by extension or MIME type
  description: |
    `handlr-regex` is a fork of the unmaintained [`handlr`](https://github.com/chmln/handlr) with additional support for
    regular expressions. It is a modern alternative to [`xdg-utils`](https://www.freedesktop.org/wiki/Software/xdg-utils/)
    that allows to set default file handlers by file extension or MIME type, to set arbitrary commands as handlers based
    on regular expressions, to open multiple files at once, and more.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/Anomalocaridid/handlr-regex
  repository: https://github.com/Anomalocaridid/handlr-regex

extra:
  recipe-maintainers:
    - salim-b
